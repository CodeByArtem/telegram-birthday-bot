name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 138.2.140.251
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/telegram-birthday-bot
            # Обновляем код (теперь git safe.directory прописан, sudo поможет)
            sudo git pull origin main
            
            # Используем docker compose (без дефиса)
            # Это решит проблему с ContainerConfig
            sudo docker compose down
            sudo docker compose up -d --build