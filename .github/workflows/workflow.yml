name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Собираем образ
      - name: Build Docker image
        run: docker build -t telegram-birthday-bot .

      # 2. Сохраняем в архив (gzip для скорости передачи)
      - name: Save Docker image
        run: docker save telegram-birthday-bot | gzip > bot.tar.gz

      # 3. Копируем на сервер
      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 138.2.140.251
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: bot.tar.gz
          target: /opt/telegram-birthday-bot/

      # 4. Развертывание
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 138.2.140.251
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            cd /opt/telegram-birthday-bot
            # Загружаем новый образ
            sudo docker load < bot.tar.gz
            # Перезапускаем контейнеры
            sudo docker compose down
            sudo docker compose up -d
            # Очистка: удаляем архив и старые неиспользуемые образы (важно для места на диске)
            rm bot.tar.gz
            sudo docker image prune -f